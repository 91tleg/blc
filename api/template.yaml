AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Description: BLC

Globals:
  Function:
    Runtime: provided.al2023   # Amazon Linux 2023 required for Rust runtimes
    Architectures:
      - arm64
    MemorySize: 128
    Timeout: 10
    Environment:
      Variables:
        EVENTS_TABLE: !Ref EventsTable
        REGISTRATIONS_TABLE: !Ref RegistrationsTable
        REGISTRATIONS_EMAIL_GSI: email-lookup
        POSTERS_BUCKET: !Ref PostersBucket
        POSTERS_PUBLIC_BASE_URL: !Sub "https://${PostersBucket}.s3.${AWS::Region}.amazonaws.com"
        ADMIN_PASSWORD_PARAM: /blc/prod/admin-password
        JWT_SECRET_PARAM: /blc/prod/jwt-secret
        RUST_LOG: "warn"
    LoggingConfig:
      LogFormat: JSON

Resources:

  BlcApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: blc-api-prod
      StageName: prod
      TracingEnabled: true
      Cors:
        AllowMethods: "'GET,POST,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"     # Change to frontend domain!!!
      Auth:
        DefaultAuthorizer: NONE

  BlcFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: rust-cargolambda
    Properties:
      FunctionName: blc-prod
      CodeUri: ./
      Handler: bootstrap
      Description: BLC event management and registration API
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref RegistrationsTable
        - S3CrudPolicy:
            BucketName: !Ref PostersBucket
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource:
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/blc/prod/admin-password"
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/blc/prod/jwt-secret"
            - Effect: Allow
              Action:
                - kms:Decrypt
              Resource: "*"
              Condition:
                StringEquals:
                  "kms:ViaService": !Sub "ssm.${AWS::Region}.amazonaws.com"
                  "kms:CallerAccount": !Ref AWS::AccountId
      Events:
        # Auth
        AdminLogin:
          Type: Api
          Properties:
            RestApiId: !Ref BlcApi
            Path: /auth/login
            Method: POST

        # Events — public
        ListEvents:
          Type: Api
          Properties:
            RestApiId: !Ref BlcApi
            Path: /events
            Method: GET

        GetEvent:
          Type: Api
          Properties:
            RestApiId: !Ref BlcApi
            Path: /events/{event_id}
            Method: GET

        # Events — admin
        CreateEvent:
          Type: Api
          Properties:
            RestApiId: !Ref BlcApi
            Path: /events
            Method: POST

        GetPosterUploadUrl:
          Type: Api
          Properties:
            RestApiId: !Ref BlcApi
            Path: /events/poster-upload-url
            Method: GET

        # Registrations — public
        RegisterForEvent:
          Type: Api
          Properties:
            RestApiId: !Ref BlcApi
            Path: /events/{event_id}/registrations
            Method: POST

        # Registrations — admin
        ListRegistrations:
          Type: Api
          Properties:
            RestApiId: !Ref BlcApi
            Path: /events/{event_id}/registrations
            Method: GET

        ListEventPosters:
          Type: Api
          Properties:
            RestApiId: !Ref BlcApi
            Path: /events/{event_id}/posters
            Method: GET

        SaveEventPoster:
          Type: Api
          Properties:
            RestApiId: !Ref BlcApi
            Path: /events/{event_id}/posters
            Method: POST

        DeleteEventPoster:
          Type: Api
          Properties:
            RestApiId: !Ref BlcApi
            Path: /events/{event_id}/posters/{poster_id}
            Method: DELETE

  EventsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: blc-events-prod
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE

  RegistrationsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: blc-registrations-prod
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: gsi_sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: email-lookup
          KeySchema:
            - AttributeName: pk
              KeyType: HASH
            - AttributeName: gsi_sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  PostersBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "blc-posters-prod-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - "*"            # Change to frontend domain!!!
            AllowedMethods:
              - PUT
              - GET
            AllowedHeaders:
              - "*"
            MaxAge: 3600

  PostersBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref PostersBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: PublicReadPosters
            Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${PostersBucket}/*"

  BlcFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${BlcFunction}"
      RetentionInDays: 30

Outputs:
  ApiBaseUrl:
    Description: API Gateway base URL
    Value: !Sub "https://${BlcApi}.execute-api.${AWS::Region}.amazonaws.com/prod"

  BlcFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt BlcFunction.Arn

  EventsTableName:
    Description: DynamoDB events table name
    Value: !Ref EventsTable

  RegistrationsTableName:
    Description: DynamoDB registrations table name
    Value: !Ref RegistrationsTable

  PostersBucketName:
    Description: S3 posters bucket name
    Value: !Ref PostersBucket
