name: Make Frontend Password Protected

on:
  workflow_dispatch:

jobs:
  protect:
    name: Add CloudFront Password Gate
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::317380566415:role/blc-github-deploy-role
          aws-region: us-east-1

      - name: Protect frontend with password page
        env:
          SITE_PASSWORD: ${{ secrets.WEB_SITE_PASSWORD }}
        run: |
          set -euo pipefail

          distribution_id="E3JTKIJUG03POH"
          account_id="317380566415"
          web_bucket="blc-private-site-isra-2026"
          function_name="blc-frontend-password-page"

          if [[ -z "${SITE_PASSWORD:-}" ]]; then
            echo "::error::WEB_SITE_PASSWORD is not set."
            exit 1
          fi

          cookie_token="$(python3 - <<'PY'
          import secrets
          print(secrets.token_urlsafe(32))
          PY
          )"

          SITE_PASSWORD="$SITE_PASSWORD" COOKIE_TOKEN="$cookie_token" python3 - <<'PY'
          import json
          import os

          password = json.dumps(os.environ["SITE_PASSWORD"])
          cookie_token = json.dumps(os.environ["COOKIE_TOKEN"])
          login_html = json.dumps("""<!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>BLC</title>
            <style>
              html, body { height: 100%; margin: 0; }
              body {
                align-items: center;
                background: linear-gradient(rgba(0, 0, 0, 0.35), rgba(0, 0, 0, 0.35)),
                  url('/static/media/blc_logo.969fb3b46415c365ddf8.png') center/cover no-repeat fixed;
                color: #181a1f;
                display: flex;
                font-family: Arial, sans-serif;
                justify-content: center;
              }
              main {
                background: rgba(255, 255, 255, 0.18);
                backdrop-filter: blur(16px);
                border: 1px solid rgba(255, 255, 255, 0.34);
                border-radius: 8px;
                box-shadow: 0 14px 40px rgba(0, 0, 0, .12);
                max-width: 360px;
                padding: 28px;
                width: calc(100% - 48px);
              }
              h1 { color: #fff; font-size: 28px; margin: 0 0 18px; text-shadow: 0 2px 10px rgba(0,0,0,.35); }
              label { color: #fff; display: block; font-size: 14px; font-weight: 700; margin-bottom: 8px; }
              input {
                border: 1px solid #aaa;
                border-radius: 6px;
                box-sizing: border-box;
                font-size: 18px;
                margin-bottom: 16px;
                padding: 12px;
                width: 100%;
              }
              button {
                background: #16181d;
                border: 0;
                border-radius: 6px;
                color: #fff;
                cursor: pointer;
                font-size: 16px;
                padding: 12px 16px;
                width: 100%;
              }
            </style>
          </head>
          <body>
            <main>
              <h1>BLC</h1>
              <form method="GET">
                <label for="blc-password">Password</label>
                <input id="blc-password" name="blc_password" type="password" autocomplete="current-password" autofocus required>
                <button type="submit">Enter</button>
              </form>
            </main>
          </body>
          </html>""")

          code = f"""function handler(event) {{
              var request = event.request;
              var querystring = request.querystring || {{}};
              var cookies = request.cookies || {{}};
              var password = querystring.blc_password && querystring.blc_password.value;
              if (password) {{
                  password = decodeURIComponent(password.replace(/\\+/g, " "));
              }}

              if (request.uri.indexOf("/static/media/blc_logo") === 0) {{
                  return request;
              }}

              if (cookies.blc_auth && cookies.blc_auth.value === {cookie_token}) {{
                  return request;
              }}

              if (password === {password}) {{
                  return {{
                      statusCode: 302,
                      statusDescription: "Found",
                      headers: {{
                          "location": {{ value: request.uri || "/" }},
                          "cache-control": {{ value: "no-store, max-age=0" }}
                      }},
                      cookies: {{
                          "blc_auth": {{
                              value: {cookie_token},
                              attributes: "Path=/; Secure; HttpOnly; SameSite=Lax"
                          }}
                      }}
                  }};
              }}

              if (querystring.blc_password) {{
                  return {{
                      statusCode: 302,
                      statusDescription: "Found",
                      headers: {{
                          "location": {{ value: request.uri || "/" }},
                          "cache-control": {{ value: "no-store, max-age=0" }}
                      }}
                  }};
              }}

              if (request.uri === "/favicon.ico") {{
                  return request;
              }}

              return {{
                  statusCode: 200,
                  statusDescription: "OK",
                  headers: {{
                      "cache-control": {{ value: "no-store, max-age=0" }},
                      "content-type": {{ value: "text/html; charset=utf-8" }}
                  }},
                  body: {login_html}
              }};
          }}
          """

          with open("frontend-auth.js", "w", encoding="utf-8") as f:
              f.write(code)
          PY

          if aws cloudfront describe-function \
            --name "$function_name" \
            --stage DEVELOPMENT \
            > describe-function.json 2>/dev/null; then
            function_etag="$(jq -r '.ETag' describe-function.json)"
            aws cloudfront update-function \
              --name "$function_name" \
              --if-match "$function_etag" \
              --function-config "Comment=BLC frontend basic auth,Runtime=cloudfront-js-2.0" \
              --function-code fileb://frontend-auth.js \
              > function.json
          else
            aws cloudfront create-function \
              --name "$function_name" \
              --function-config "Comment=BLC frontend basic auth,Runtime=cloudfront-js-2.0" \
              --function-code fileb://frontend-auth.js \
              > function.json
          fi

          function_etag="$(jq -r '.ETag' function.json)"
          aws cloudfront publish-function \
            --name "$function_name" \
            --if-match "$function_etag" \
            > published-function.json
          function_arn="$(jq -r '.FunctionSummary.FunctionMetadata.FunctionARN' published-function.json)"

          cat > web-bucket-policy.json <<JSON
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Sid": "AllowCloudFrontRead",
                "Effect": "Allow",
                "Principal": {
                  "Service": "cloudfront.amazonaws.com"
                },
                "Action": "s3:GetObject",
                "Resource": "arn:aws:s3:::$web_bucket/*",
                "Condition": {
                  "StringEquals": {
                    "AWS:SourceArn": "arn:aws:cloudfront::$account_id:distribution/$distribution_id"
                  }
                }
              }
            ]
          }
          JSON

          aws s3api put-bucket-policy \
            --bucket "$web_bucket" \
            --policy file://web-bucket-policy.json

          aws s3api put-public-access-block \
            --bucket "$web_bucket" \
            --public-access-block-configuration \
              BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true

          aws cloudfront get-distribution-config \
            --id "$distribution_id" \
            > distribution.json
          distribution_etag="$(jq -r '.ETag' distribution.json)"

          jq --arg function_arn "$function_arn" '
            .DistributionConfig
            | .DefaultRootObject = "index.html"
            | .Origins.Items |= map(.OriginPath = "")
            | .DefaultCacheBehavior.FunctionAssociations = {
                "Quantity": 1,
                "Items": [
                  {
                    "EventType": "viewer-request",
                    "FunctionARN": $function_arn
                  }
                ]
              }
            | if .CacheBehaviors.Quantity > 0 then
                .CacheBehaviors.Items |= map(
                  .FunctionAssociations = {
                    "Quantity": 1,
                    "Items": [
                      {
                        "EventType": "viewer-request",
                        "FunctionARN": $function_arn
                      }
                    ]
                  }
                )
              else
                .
              end
          ' distribution.json > protected-distribution.json

          aws cloudfront update-distribution \
            --id "$distribution_id" \
            --if-match "$distribution_etag" \
            --distribution-config file://protected-distribution.json

          aws cloudfront wait distribution-deployed --id "$distribution_id"

          invalidation_id="$(
            aws cloudfront create-invalidation \
              --distribution-id "$distribution_id" \
              --paths "/*" \
              --query 'Invalidation.Id' \
              --output text
          )"

          aws cloudfront wait invalidation-completed \
            --distribution-id "$distribution_id" \
            --id "$invalidation_id"
