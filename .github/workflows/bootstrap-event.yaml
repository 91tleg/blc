name: Bootstrap Backend Event

on:
  workflow_dispatch:
    inputs:
      name:
        description: Event name to create or reuse
        required: true
        default: BLC Registration Event
      location:
        description: Event location
        required: true
        default: Bellevue College
      starts_at:
        description: Event start time as RFC3339 UTC
        required: true
        default: "2026-05-01T17:00:00Z"
      ends_at:
        description: Event end time as RFC3339 UTC
        required: true
        default: "2026-05-01T19:00:00Z"
      capacity:
        description: Maximum registrations
        required: true
        default: "200"

jobs:
  bootstrap:
    name: Create or Reuse Event
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::317380566415:role/blc-github-deploy-role
          aws-region: us-east-1

      - name: Create or reuse backend event
        id: event
        env:
          API_BASE_URL: https://etbd03yep5.execute-api.us-east-1.amazonaws.com/prod
          EVENT_NAME: ${{ inputs.name }}
          EVENT_LOCATION: ${{ inputs.location }}
          EVENT_STARTS_AT: ${{ inputs.starts_at }}
          EVENT_ENDS_AT: ${{ inputs.ends_at }}
          EVENT_CAPACITY: ${{ inputs.capacity }}
        run: |
          set -euo pipefail

          events="$(curl -fsS "$API_BASE_URL/events?limit=100")"
          event_id="$(jq -r --arg name "$EVENT_NAME" '.events[]? | select(.name == $name) | .event_id' <<< "$events" | head -n 1)"
          action="reused"

          if [[ -z "$event_id" ]]; then
            admin_password="$(
              aws ssm get-parameter \
                --name /blc/prod/admin-password \
                --with-decryption \
                --query 'Parameter.Value' \
                --output text
            )"
            login_body="$(jq -nc --arg password "$admin_password" '{password: $password}')"
            token="$(
              curl -fsS -X POST "$API_BASE_URL/auth/login" \
                -H "Content-Type: application/json" \
                --data "$login_body" \
                | jq -r '.token // empty'
            )"

            if [[ -z "$token" ]]; then
              echo "::error::Failed to obtain an admin token from the backend."
              exit 1
            fi

            event_body="$(
              jq -nc \
                --arg name "$EVENT_NAME" \
                --arg location "$EVENT_LOCATION" \
                --arg starts_at "$EVENT_STARTS_AT" \
                --arg ends_at "$EVENT_ENDS_AT" \
                --argjson capacity "$EVENT_CAPACITY" \
                '{
                  name: $name,
                  location: $location,
                  starts_at: $starts_at,
                  ends_at: $ends_at,
                  capacity: $capacity
                }'
            )"
            response="$(
              curl -fsS -X POST "$API_BASE_URL/events" \
                -H "Authorization: Bearer $token" \
                -H "Content-Type: application/json" \
                --data "$event_body"
            )"
            event_id="$(jq -r '.event_id // empty' <<< "$response")"
            action="created"
          fi

          if [[ -z "$event_id" ]]; then
            echo "::error::No event ID was returned."
            exit 1
          fi

          echo "event_id=$event_id" >> "$GITHUB_OUTPUT"
          echo "::notice title=WEB_EVENT_ID::$event_id"
          echo "Backend event $action: $event_id"

      - name: Print frontend URL
        run: |
          set -euo pipefail

          if domain="$(
            aws cloudfront get-distribution \
              --id E3JTKIJUG03POH \
              --query 'Distribution.DomainName' \
              --output text
          )"; then
            echo "::notice title=Frontend URL::https://$domain"
            echo "FRONTEND_URL=https://$domain"
          else
            echo "::warning::Could not read the CloudFront domain for E3JTKIJUG03POH."
          fi
