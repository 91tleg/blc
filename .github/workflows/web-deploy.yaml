name: Web Deploy to prod

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - web/**
      - .github/workflows/web-deploy.yaml

concurrency:
  group: deploy-web-prod
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web
        env:
          REACT_APP_API_BASE_URL: ${{ secrets.WEB_API_URL }}
          REACT_APP_EVENT_ID: ${{ secrets.WEB_EVENT_ID }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: web/build
          retention-days: 1

  deploy:
    name: Deploy to S3 & CloudFront
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::317380566415:role/blc-github-deploy-role
          aws-region: us-east-1

      - name: Deploy to S3
        run: |
          aws s3 sync build/ s3://blc-private-site-isra-2026 \
            --delete \
            --cache-control "public, max-age=31536000" \
            --exclude "index.html"
          
          aws s3 cp build/index.html s3://blc-private-site-isra-2026/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E3JTKIJUG03POH \
            --paths "/*"
