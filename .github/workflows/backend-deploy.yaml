name: Backend Deploy to prod

on:
  push:
    branches:
      - main
    paths:
      - api/**
      - .github/workflows/backend-deploy.yaml

concurrency:
  group: deploy-backend-prod
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: api

      - name: Run tests
        run: cargo test --locked
        working-directory: api

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: api

      - name: Install cargo-lambda
        uses: cargo-lambda/setup-cargo-lambda@v1

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::317380566415:role/blc-github-deploy-role
          aws-region: us-east-1

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: SAM build
        run: sam build --cached --parallel
        working-directory: api

      - name: SAM deploy
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset
        working-directory: api
