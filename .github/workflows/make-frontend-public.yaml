name: Make Frontend Public

on:
  workflow_dispatch:

jobs:
  make-public:
    name: Remove CloudFront Password Gate
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::317380566415:role/blc-github-deploy-role
          aws-region: us-east-1

      - name: Remove viewer auth functions
        run: |
          set -euo pipefail

          distribution_id="E3JTKIJUG03POH"
          web_bucket="blc-private-site-isra-2026"

          aws s3api put-public-access-block \
            --bucket "$web_bucket" \
            --public-access-block-configuration \
              BlockPublicAcls=false,IgnorePublicAcls=false,BlockPublicPolicy=false,RestrictPublicBuckets=false

          cat > web-bucket-policy.json <<'JSON'
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Sid": "PublicReadStaticSite",
                "Effect": "Allow",
                "Principal": "*",
                "Action": "s3:GetObject",
                "Resource": "arn:aws:s3:::blc-private-site-isra-2026/*"
              }
            ]
          }
          JSON

          aws s3api put-bucket-policy \
            --bucket "$web_bucket" \
            --policy file://web-bucket-policy.json

          aws cloudfront get-distribution-config \
            --id "$distribution_id" \
            > distribution.json

          etag="$(jq -r '.ETag' distribution.json)"

          jq '
            .DistributionConfig
            | .DefaultRootObject = "index.html"
            | .DefaultCacheBehavior.FunctionAssociations = {"Quantity": 0}
            | .DefaultCacheBehavior.LambdaFunctionAssociations = {"Quantity": 0}
            | if .CacheBehaviors.Quantity > 0 then
                .CacheBehaviors.Items |= map(
                  .FunctionAssociations = {"Quantity": 0}
                  | .LambdaFunctionAssociations = {"Quantity": 0}
                )
              else
                .
              end
          ' distribution.json > public-distribution.json

          aws cloudfront update-distribution \
            --id "$distribution_id" \
            --if-match "$etag" \
            --distribution-config file://public-distribution.json

          aws cloudfront wait distribution-deployed --id "$distribution_id"

          aws cloudfront create-invalidation \
            --distribution-id "$distribution_id" \
            --paths "/*"
